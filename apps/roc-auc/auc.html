        <div class="exercise-container">
            <div class="info-box">
                <p>The shaded area under the ROC curve is the AUC. Unlike sensitivity or specificity at a single threshold, the AUC summarizes the model’s ability across all possible thresholds and does not depend on choosing one cutoff.</p>
            </div>

            <div class="canvas-container">
                <canvas id="roc-canvas"></canvas>
            </div>
